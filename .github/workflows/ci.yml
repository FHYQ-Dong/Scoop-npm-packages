name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [powershell, pwsh]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need at least 2 commits to properly gather changed files for linting
          fetch-depth: 2
          path: 'my_bucket'
      - name: Checkout Scoop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ScoopInstaller/Scoop
          path: 'scoop_core'
      - name: Install and cache test dependencies
        uses: potatoqualitee/psmodulecache@ee5e9494714abf56f6efbfa51527b2aec5c761b8 # v6.2.1
        with:
          modules-to-cache: BuildHelpers, Pester
          shell: ${{ matrix.shell }}
      - name: Run tests
        run: |
          $env:SCOOP_HOME="$(Convert-Path '.\scoop_core')"
          .\my_bucket\bin\test.ps1

  check-manifests:
    name: Check changed manifests
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: 'my_bucket'
      - name: Install Scoop
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
          New-Item -ItemType Directory -Force "$env:USERPROFILE\scoop\cache" | Out-Null
          "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH
      - name: Find changed manifests
        id: changed
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $diff = git -C my_bucket diff --name-only 'origin/${{ github.base_ref }}...HEAD' -- 'bucket/*.json'
          } elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $diff = Get-ChildItem my_bucket/bucket/*.json | ForEach-Object { "bucket/$($_.Name)" }
          } else {
            $diff = git -C my_bucket diff --name-only HEAD^ HEAD -- 'bucket/*.json'
          }
          $apps = @($diff | Where-Object { $_ } | ForEach-Object { [IO.Path]::GetFileNameWithoutExtension((Split-Path $_ -Leaf)) })
          "apps=$($apps -join ' ')" >> $env:GITHUB_OUTPUT
          "count=$($apps.Count)" >> $env:GITHUB_OUTPUT
          Write-Host "Changed manifests: $($apps -join ', ')"
      - name: Check hashes, URLs, and versions
        if: steps.changed.outputs.count != '0'
        run: |
          $env:SCOOP_HOME = "$env:USERPROFILE\scoop\apps\scoop\current"
          $dir = Convert-Path '.\my_bucket\bucket'
          $apps = '${{ steps.changed.outputs.apps }}' -split ' ' | Where-Object { $_ }
          $failed = $false
          foreach ($app in $apps) {
            Write-Host "`n=== ${app}: checkhashes ==="
            & "$env:SCOOP_HOME/bin/checkhashes.ps1" -Dir $dir -App $app
            if ($LASTEXITCODE -ne 0) { $failed = $true }

            Write-Host "`n=== ${app}: checkurls ==="
            & "$env:SCOOP_HOME/bin/checkurls.ps1" -Dir $dir -App $app
            if ($LASTEXITCODE -ne 0) { $failed = $true }

            Write-Host "`n=== ${app}: checkver ==="
            & "$env:SCOOP_HOME/bin/checkver.ps1" -Dir $dir $app
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
